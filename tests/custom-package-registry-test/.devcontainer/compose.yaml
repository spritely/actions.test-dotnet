name: custom-package-registry

services:
  dev:
    image: mcr.microsoft.com/dotnet/sdk:10.0.301-resolute-amd64
    command: /bin/sh -c "sleep infinity"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ../:/src
      - ../tests/custom-package-registry-test/logs:/logs

  package-registry:
    image: docker.io/loicsharma/baget:0.4.0-preview2
    environment:
      - ApiKey=fake-token
    ports:
      - "5001:80"
