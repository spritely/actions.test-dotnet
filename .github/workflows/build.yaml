name: Build

on: [push, workflow_dispatch]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@8f7bbefbb8c3e4f457933ae3b2ce14a30fc754d4 # v0.7.50

      - name: Create .env for build
        shell: bash
        run: |
          cat > ./.devcontainer/.env <<EOF
          EOF

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@8f7bbefbb8c3e4f457933ae3b2ce14a30fc754d4 # v0.7.50
        with:
          version: ${{ steps.version.outputs.version }}
