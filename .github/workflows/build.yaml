name: Build

on: [push, workflow_dispatch]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@cfa6f8afc2403c76ef01b7b40c49fefd57ce20f0 # v0.8.24

      - name: Create .env for build
        shell: bash
        run: |
          cat > ./.devcontainer/.env <<EOF
          EOF

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@cfa6f8afc2403c76ef01b7b40c49fefd57ce20f0 # v0.8.24
        with:
          version: ${{ steps.version.outputs.version }}
