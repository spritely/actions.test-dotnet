services:
  actions-test-dotnet-dev:
    container_name: actions-test-dotnet-dev
    image: docker.io/spritelydev/dotnet10-devcontainer:0.4.46@sha256:678fda82602ffacb7e59ed594b8dc2d8a66aac1cc22614c9ac5d54231a65e836
    privileged: true
    command: /bin/sh -c "sleep infinity"
    volumes:
      - ../:/src
      - ${HOME:-$USERPROFILE}/.ssh:/root/.ssh:ro
    env_file:
      - .env
    # Environment variables have higher precedence than the .env file
    environment:
      - NUGET_TOKEN=${NUGET_TOKEN}
